name: Publish NuGet Package

on:
  push:
    tags:
      - 'windows/v*.*.*'

permissions:
  contents: read

jobs:
  publish:
    name: Build and Publish to NuGet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: |
          # Extract version from tag (windows/v1.2.3 → 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/windows/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore windows/src/Sigil.Windows.Core/Sigil.Windows.Core.csproj

      - name: Build
        run: dotnet build windows/src/Sigil.Windows.Core/Sigil.Windows.Core.csproj -c Release --no-restore

      - name: Run tests
        run: dotnet test windows/tests/Sigil.Windows.Core.Tests/Sigil.Windows.Core.Tests.csproj -c Release --no-build --filter "FullyQualifiedName~UnitTests"

      - name: Pack
        run: dotnet pack windows/src/Sigil.Windows.Core/Sigil.Windows.Core.csproj -c Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }} -o ./nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*.nupkg
          retention-days: 90

name: macOS Desktop CI

on:
  push:
    branches: [main]
    paths:
      - 'macos/**'
      - '.github/workflows/macos-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'macos/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint (SwiftLint)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        working-directory: macos
        run: swiftlint lint --strict

  test:
    name: Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Run tests
        working-directory: macos
        run: |
          # Use run-tests.sh to avoid XCTest suite crash (see GitHub issue #1)
          # Tests pass individually but crash when run via `swift test` (full suite)
          chmod +x run-tests.sh
          ./run-tests.sh

      - name: Coverage check
        working-directory: macos
        run: |
          # TODO: Re-enable coverage once swift test suite crash is fixed (issue #1)
          # For now, coverage check disabled - run-tests.sh doesn't collect coverage
          echo "Coverage check skipped - waiting for swift test suite fix"

  tdd-audit:
    name: TDD Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin main:main || true

      - name: Run TDD audit
        working-directory: macos
        run: bash ../../scripts/tdd-audit.sh origin/main

  security:
    name: Security Scan
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Run security analysis
        working-directory: macos
        run: |
          xcodebuild analyze \
            -scheme SigilMac \
            -destination 'platform=macOS'

  build:
    name: Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build app
        working-directory: macos
        run: |
          xcodebuild build \
            -scheme SigilMac \
            -destination 'platform=macOS' \
            -configuration Release

  all-checks:
    name: All Checks Passed
    needs: [lint, test, tdd-audit, security, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.tdd-audit.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All macOS checks passed!"

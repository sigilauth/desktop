name: Release Desktop Apps

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build macOS app
        working-directory: macos
        run: |
          xcodebuild archive \
            -scheme SigilMac \
            -configuration Release \
            -archivePath build/SigilMac.xcarchive

      - name: Export app
        working-directory: macos
        run: |
          xcodebuild -exportArchive \
            -archivePath build/SigilMac.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      - name: Create DMG
        working-directory: macos
        run: |
          # Create a DMG from the exported app
          hdiutil create -volname "Sigil" -srcfolder build/Sigil.app -ov -format UDZO build/Sigil-macOS.dmg

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit macos/build/Sigil-macOS.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: macos/build/Sigil-macOS.dmg

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: windows
        run: dotnet restore

      - name: Publish
        working-directory: windows
        run: |
          dotnet publish --configuration Release --runtime win-x64 --self-contained true --output publish

      - name: Create installer (NSIS)
        working-directory: windows
        run: |
          # Placeholder for NSIS installer creation
          # makensis installer.nsi
          echo "NSIS installer creation placeholder"

      - name: Sign executable
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > cert.pfx

          # Sign the executable (requires signtool from Windows SDK)
          # signtool sign /f cert.pfx /p "$CERTIFICATE_PASSWORD" /tr http://timestamp.digicert.com /td sha256 /fd sha256 windows/publish/Sigil.exe
          echo "Authenticode signing placeholder"

          # Clean up
          rm cert.pfx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: windows/publish/Sigil.exe

  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install GTK4 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev

      - name: Build
        working-directory: linux
        run: cargo build --release

      - name: Create AppImage
        working-directory: linux
        run: |
          # Placeholder for AppImage creation
          # Use appimagetool or linuxdeploy
          echo "AppImage creation placeholder"
          cp target/release/sigil-linux sigil-linux

      - name: Sign with GPG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --import
          gpg --batch --yes --passphrase "$GPG_PASSPHRASE" --detach-sign linux/sigil-linux
          echo "GPG signature created: sigil-linux.sig"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: |
            linux/sigil-linux
            linux/sigil-linux.sig

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/desktop-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="desktop-dev-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Sigil Desktop ${{ steps.version.outputs.version }}
          body: |
            ## Sigil Desktop ${{ steps.version.outputs.version }}

            **Platform binaries:**
            - macOS: Sigil-macOS.dmg (notarized)
            - Windows: Sigil.exe (Authenticode signed)
            - Linux: sigil-linux (GPG signed)

            **Installation:**
            - macOS: Download DMG, drag to Applications
            - Windows: Download EXE, run installer
            - Linux: Download binary, verify signature, chmod +x, run

            **Changes:**
            - See commit history for details
          files: |
            macos-dmg/Sigil-macOS.dmg
            windows-exe/Sigil.exe
            linux-binary/sigil-linux
            linux-binary/sigil-linux.sig
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/desktop-v') }}
